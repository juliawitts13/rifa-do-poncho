<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa do Poncho</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F7F8FA;
    color: #1a1a1a;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #EAECF0;
    padding: 18px 20px 14px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .app-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #111;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ticket-icon {
    background: #7C3AED;
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat-card {
    background: #F7F8FA;
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-card .val {
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.1;
  }

  .stat-card .lbl {
    font-size: 0.7rem;
    font-weight: 500;
    color: #6B7280;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .val.v-livre  { color: #374151; }
  .val.v-res    { color: #D97706; }
  .val.v-pago   { color: #DC2626; }

  .legend {
    display: flex;
    gap: 16px;
    padding: 12px 20px;
    background: #fff;
    border-bottom: 1px solid #EAECF0;
    font-size: 0.72rem;
    font-weight: 500;
    color: #6B7280;
    flex-wrap: wrap;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; }

  .pip {
    width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0;
  }
  .pip.livre     { background: #F3F4F6; border: 1.5px solid #D1D5DB; }
  .pip.reservado { background: #FEF3C7; border: 1.5px solid #F59E0B; }
  .pip.pago      { background: #FEE2E2; border: 1.5px solid #F87171; }
  .pip.selecionado { background: #EDE9FE; border: 1.5px solid #7C3AED; }

  .grid-wrap { padding: 16px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    max-width: 560px;
    margin: 0 auto;
  }

  .num-btn {
    aspect-ratio: 1;
    border-radius: 9px;
    border: 1.5px solid #D1D5DB;
    background: #F9FAFB;
    color: #374151;
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .num-btn:active { transform: scale(0.88); }

  .num-btn.reservado {
    background: #FEF3C7;
    border-color: #F59E0B;
    color: #92400E;
    position: relative;
    overflow: hidden;
  }

  .num-btn.reservado::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 42%, #F59E0B 42%, #F59E0B 58%, transparent 58%);
    opacity: 0.45;
  }

  .num-btn.pago {
    background: #FEE2E2;
    border-color: #F87171;
    color: #991B1B;
    position: relative;
    overflow: hidden;
  }

  .num-btn.pago::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 42%, #F87171 42%, #F87171 58%, transparent 58%),
                linear-gradient(45deg,  transparent 42%, #F87171 42%, #F87171 58%, transparent 58%);
    opacity: 0.55;
  }

  .num-btn.selecionado {
    background: #EDE9FE;
    border-color: #7C3AED;
    color: #5B21B6;
    box-shadow: 0 0 0 2px #C4B5FD;
  }

  .num-btn.selecionado::after {
    content: '✓';
    position: absolute;
    top: 1px; right: 3px;
    font-size: 0.55rem;
    color: #7C3AED;
  }

  /* BARRA FLUTUANTE DE SELEÇÃO */
  .selection-bar {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #fff;
    border-radius: 16px;
    padding: 12px 16px;
    align-items: center;
    gap: 12px;
    z-index: 150;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    max-width: calc(100% - 32px);
    width: auto;
  }

  .selection-bar.visible { display: flex; }

  .sel-info {
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .sel-nums {
    font-size: 0.72rem;
    color: #9CA3AF;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sel-actions { display: flex; gap: 8px; }

  .sel-btn {
    padding: 8px 14px;
    border-radius: 10px;
    border: none;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .sel-btn-confirm { background: #7C3AED; color: #fff; }
  .sel-btn-cancel  { background: #2D2D2D; color: #9CA3AF; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #9CA3AF;
    font-size: 0.9rem;
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(17,17,17,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 12px 20px 36px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.2s ease;
    max-height: 92vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(32px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: #E5E7EB;
    border-radius: 99px;
    margin: 0 auto 20px;
  }

  .modal-header { margin-bottom: 18px; }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 6px;
  }

  .numeros-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .chip {
    background: #EDE9FE;
    color: #5B21B6;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.8rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .chip-remove {
    cursor: pointer;
    opacity: 0.6;
    font-size: 0.9rem;
    line-height: 1;
    background: none;
    border: none;
    color: inherit;
    padding: 0;
  }

  .chip-remove:hover { opacity: 1; }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #6B7280;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    background: #F9FAFB;
    border: 1.5px solid #E5E7EB;
    border-radius: 10px;
    color: #111;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 11px 13px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: #7C3AED;
    background: #fff;
  }

  .field textarea { resize: none; height: 64px; }

  .status-pills {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .pill {
    padding: 10px 6px;
    border-radius: 10px;
    border: 1.5px solid #E5E7EB;
    background: #F9FAFB;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    color: #6B7280;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .pill.sel-disponivel { background: #F3F4F6; border-color: #9CA3AF; color: #374151; }
  .pill.sel-reservado  { background: #FEF3C7; border-color: #F59E0B; color: #92400E; }
  .pill.sel-pago       { background: #D1FAE5; border-color: #34D399; color: #065F46; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 11px;
    border: none;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.97); }
  .btn-save   { background: #7C3AED; color: #fff; }
  .btn-cancel { background: #F3F4F6; color: #374151; flex: 0; padding: 13px 18px; }

  .wpp-btn {
    display: none;
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    border-radius: 11px;
    background: #ECFDF5;
    border: 1.5px solid #34D399;
    color: #065F46;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .qr-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 11px;
    background: #F5F3FF;
    border: 1.5px solid #C4B5FD;
    color: #5B21B6;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .qr-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(17,17,17,0.6);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .qr-overlay.open { display: flex; }

  .qr-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 320px;
    width: 100%;
    text-align: center;
    animation: slideUp 0.2s ease;
  }

  .qr-card h3 { font-size: 1rem; font-weight: 700; color: #111; margin-bottom: 4px; }
  .qr-card p  { font-size: 0.78rem; color: #6B7280; margin-bottom: 16px; }
  .qr-card img { width: 100%; border-radius: 12px; border: 1px solid #E5E7EB; }

  .qr-close {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    border-radius: 11px;
    background: #F3F4F6;
    border: none;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    color: #374151;
    cursor: pointer;
  }

  /* MODO VISUALIZAÇÃO */
  .modal.modo-visualizacao .field input,
  .modal.modo-visualizacao .field select,
  .modal.modo-visualizacao .field textarea {
    background: #F3F4F6;
    color: #374151;
    pointer-events: none;
    border-color: #E5E7EB;
  }

  .modal.modo-visualizacao .status-pills .pill {
    pointer-events: none;
    opacity: 0.7;
  }

  .modal.modo-visualizacao .status-pills .pill:not([class*="sel-"]) {
    display: none;
  }

  .modal.modo-visualizacao .chip-remove { display: none; }

  .modal.modo-visualizacao .modal-actions { display: none; }

  .btn-editar {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    border-radius: 11px;
    background: #F3F4F6;
    border: none;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    color: #374151;
    cursor: pointer;
    display: none;
  }

  .modal.modo-visualizacao .btn-editar { display: block; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #111;
    color: #fff;
    font-size: 0.84rem;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 99px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 400;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="app-title">
      <div class="ticket-icon">🎟</div>
      Rifa do Poncho
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-card">
      <div class="val v-livre" id="st-disp">—</div>
      <div class="lbl">Disponíveis</div>
    </div>
    <div class="stat-card">
      <div class="val v-res" id="st-res">—</div>
      <div class="lbl">Reservados</div>
    </div>
    <div class="stat-card">
      <div class="val v-pago" id="st-pago">—</div>
      <div class="lbl">Pagos</div>
    </div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="pip livre"></div>Disponível</div>
  <div class="legend-item"><div class="pip reservado"></div>Reservado</div>
  <div class="legend-item"><div class="pip pago"></div>Pago</div>
  <div class="legend-item"><div class="pip selecionado"></div>Selecionado</div>
</div>

<div class="grid-wrap">
  <div id="loading" class="loading">Carregando...</div>
  <div class="grid" id="grid" style="display:none"></div>
</div>

<!-- BARRA FLUTUANTE -->
<div class="selection-bar" id="selection-bar">
  <div>
    <div class="sel-info" id="sel-info">0 selecionados</div>
    <div class="sel-nums" id="sel-nums"></div>
  </div>
  <div class="sel-actions">
    <button class="sel-btn sel-btn-cancel" onclick="limparSelecao()">Cancelar</button>
    <button class="sel-btn sel-btn-confirm" onclick="abrirModal()">Registrar →</button>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>

    <div class="modal-header">
      <div class="modal-title">Registrar números</div>
      <div class="numeros-chips" id="numeros-chips"></div>
    </div>

    <div class="field">
      <label>Nome</label>
      <input type="text" id="m-nome" placeholder="Quem comprou estes números?" autocomplete="off">
    </div>

    <div class="field">
      <label>Telefone (com DDD)</label>
      <input type="tel" id="m-telefone" placeholder="11 99999-9999" autocomplete="off">
    </div>

    <div class="field">
      <label>Status</label>
      <div class="status-pills">
        <button class="pill" data-status="disponivel" onclick="selecionarStatus('disponivel')">Disponível</button>
        <button class="pill" data-status="reservado"  onclick="selecionarStatus('reservado')">Reservado</button>
        <button class="pill" data-status="pago"       onclick="selecionarStatus('pago')">Pago ✓</button>
      </div>
    </div>

    <div class="field">
      <label>Observação <span style="font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
      <textarea id="m-obs" placeholder="Anotações..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-save" onclick="salvar()">Salvar</button>
    </div>

    <a id="wpp-link" class="wpp-btn" target="_blank">
      💬 Enviar confirmação no WhatsApp
    </a>

    <button class="qr-btn" onclick="abrirQR()">📷 Ver QR Code Pix para pagamento</button>
    <button class="btn-editar" onclick="ativarEdicao()">✏️ Editar este número</button>
  </div>
</div>

<!-- QR CODE MODAL -->
<div class="qr-overlay" id="qr-overlay" onclick="fecharQR()">
  <div class="qr-card" onclick="event.stopPropagation()">
    <h3>QR Code Pix</h3>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://swegepldmsimsxrosygl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3ZWdlcGxkbXNpbXN4cm9zeWdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODI3OTYsImV4cCI6MjA5NzQ1ODc5Nn0.xKSRpE6BxVnBuRb-Udv9Fce7y75ibJOueqK9iwqkEIk';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let numeros = {};
let selecionados = new Set();
let statusAtual = 'reservado';

async function carregar() {
  const { data, error } = await db.from('numeros_rifa').select('*').order('numero');
  if (error) { document.getElementById('loading').textContent = 'Erro ao carregar.'; return; }
  numeros = {};
  data.forEach(n => numeros[n.numero] = n);
  renderGrid();
  atualizarStats();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 100; i++) {
    const n = numeros[i];
    const btn = document.createElement('button');
    const st = n?.status || 'disponivel';
    btn.className = 'num-btn ' + st + (selecionados.has(i) ? ' selecionado' : '');
    btn.textContent = i;
    btn.onclick = () => toggleNumero(i);
    grid.appendChild(btn);
  }
}

function toggleNumero(num) {
  const n = numeros[num];
  const st = n?.status || 'disponivel';

  // Número já registrado: abre modal de visualização direto, sem entrar na seleção
  if (st !== 'disponivel') {
    abrirModalVisualizacao(num);
    return;
  }

  // Número disponível: entra no fluxo de seleção múltipla
  if (selecionados.has(num)) {
    selecionados.delete(num);
  } else {
    selecionados.add(num);
  }

  const btns = document.querySelectorAll('.num-btn');
  const btn = btns[num - 1];
  btn.className = 'num-btn ' + st + (selecionados.has(num) ? ' selecionado' : '');

  atualizarBarraSelecao();
}

function abrirModalVisualizacao(num) {
  const n = numeros[num];
  // Limpa seleção pra não confundir
  selecionados.clear();
  renderGrid();
  atualizarBarraSelecao();

  // Monta modal em modo visualização
  document.getElementById('m-nome').value     = n.nome || '';
  document.getElementById('m-telefone').value = n.telefone || '';
  document.getElementById('m-obs').value      = n.observacao || '';
  selecionarStatus(n.status);

  // Chips com apenas esse número + indicação de edição
  selecionados.add(num);
  renderChips();

  // Muda título
  document.querySelector('.modal-title').textContent = 'Número #' + String(num).padStart(2,'0');

  // Ativa modo visualização
  document.getElementById('modal').classList.add('modo-visualizacao');

  atualizarWpp();
  document.getElementById('overlay').classList.add('open');
}

function atualizarBarraSelecao() {
  const bar = document.getElementById('selection-bar');
  const count = selecionados.size;

  if (count === 0) {
    bar.classList.remove('visible');
    return;
  }

  bar.classList.add('visible');
  const sorted = [...selecionados].sort((a,b) => a-b);
  document.getElementById('sel-info').textContent = count === 1 ? '1 número selecionado' : count + ' números selecionados';
  document.getElementById('sel-nums').textContent = sorted.map(n => '#' + String(n).padStart(2,'0')).join(', ');
}

function limparSelecao() {
  selecionados.clear();
  renderGrid();
  atualizarBarraSelecao();
}

function abrirModal() {
  if (selecionados.size === 0) return;

  // Pré-preencher se for edição de número já registrado
  const sorted = [...selecionados].sort((a,b) => a-b);
  if (sorted.length === 1) {
    const n = numeros[sorted[0]];
    if (n && n.status !== 'disponivel') {
      document.getElementById('m-nome').value     = n.nome || '';
      document.getElementById('m-telefone').value = n.telefone || '';
      document.getElementById('m-obs').value      = n.observacao || '';
      selecionarStatus(n.status);
    } else {
      limparFormulario();
      selecionarStatus('reservado');
    }
  } else {
    limparFormulario();
    selecionarStatus('reservado');
  }

  renderChips();
  atualizarWpp();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-nome').focus(), 200);
}

function limparFormulario() {
  document.getElementById('m-nome').value = '';
  document.getElementById('m-telefone').value = '';
  document.getElementById('m-obs').value = '';
}

function renderChips() {
  const container = document.getElementById('numeros-chips');
  container.innerHTML = '';
  const sorted = [...selecionados].sort((a,b) => a-b);
  sorted.forEach(num => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = '#' + String(num).padStart(2,'0') +
      '<button class="chip-remove" onclick="removerChip(' + num + ')">×</button>';
    container.appendChild(chip);
  });
}

function removerChip(num) {
  selecionados.delete(num);
  const btns = document.querySelectorAll('.num-btn');
  const n = numeros[num];
  const st = n?.status || 'disponivel';
  btns[num-1].className = 'num-btn ' + st;
  renderChips();
  atualizarBarraSelecao();
  if (selecionados.size === 0) fecharModal();
}

function selecionarStatus(st) {
  statusAtual = st;
  document.querySelectorAll('.pill').forEach(p => {
    p.className = 'pill';
    if (p.dataset.status === st) p.classList.add('sel-' + st);
  });
  atualizarWpp();
}

['m-nome', 'm-telefone'].forEach(id => {
  document.getElementById(id).addEventListener('input', atualizarWpp);
});

function atualizarWpp() {
  const tel  = document.getElementById('m-telefone').value.replace(/\D/g, '');
  const nome = document.getElementById('m-nome').value.trim();
  const link = document.getElementById('wpp-link');
  const sorted = [...selecionados].sort((a,b) => a-b);

  if (tel.length >= 10 && nome && statusAtual !== 'disponivel' && sorted.length > 0) {
    const nums = sorted.map(n => '#' + String(n).padStart(2,'0')).join(', ');
    const msg = statusAtual === 'pago'
      ? `Oi ${nome}! 🎉 Seus números ${nums} da Rifa do Poncho foram confirmados. Pagamento recebido, boa sorte! 🎟️`
      : `Oi ${nome}! Seus números ${nums} da Rifa do Poncho estão reservados 🎟️ Assim que o pagamento for confirmado, finalizamos seus bilhetes!`;
    const fone = tel.startsWith('55') ? tel : '55' + tel;
    link.href = `https://wa.me/${fone}?text=${encodeURIComponent(msg)}`;
    link.style.display = 'block';
  } else {
    link.style.display = 'none';
  }
}

async function salvar() {
  const nome       = document.getElementById('m-nome').value.trim();
  const telefone   = document.getElementById('m-telefone').value.trim();
  const observacao = document.getElementById('m-obs').value.trim();

  const updates = [...selecionados].map(num => ({
    numero: num, nome, telefone, status: statusAtual, observacao,
    atualizado_em: new Date().toISOString()
  }));

  const { error } = await db.from('numeros_rifa').upsert(updates, { onConflict: 'numero' });
  if (error) { mostrarToast('Erro ao salvar'); return; }

  selecionados.forEach(num => {
    numeros[num] = { numero: num, nome, telefone, status: statusAtual, observacao };
  });

  renderGrid();
  atualizarStats();
  limparSelecao();
  fecharModal();
  mostrarToast('Salvo ✓');
}

function ativarEdicao() {
  document.getElementById('modal').classList.remove('modo-visualizacao');
  document.querySelector('.modal-title').textContent = 'Editar número';
  document.getElementById('m-nome').focus();
}

function atualizarStats() {
  let d = 0, r = 0, p = 0;
  Object.values(numeros).forEach(n => {
    if (n.status === 'disponivel') d++;
    else if (n.status === 'reservado') r++;
    else if (n.status === 'pago') p++;
  });
  document.getElementById('st-disp').textContent = d;
  document.getElementById('st-res').textContent  = r;
  document.getElementById('st-pago').textContent = p;
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modal').classList.remove('modo-visualizacao');
  document.querySelector('.modal-title').textContent = 'Registrar números';
  selecionados.clear();
  renderGrid();
  atualizarBarraSelecao();
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) fecharModal();
});

function abrirQR() { document.getElementById('qr-overlay').classList.add('open'); }
function fecharQR() { document.getElementById('qr-overlay').classList.remove('open'); }

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

carregar();
</script>
</body>
